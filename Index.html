<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Nosso Amor ❤️</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;

      background-image: url("fundo.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;

      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* TELA INICIAL */
    .start {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      z-index: 10;
      cursor: pointer;
    }

    /* CARROSSEL */
    .carrossel {
      position: relative;
      margin-top: 80px;
      width: 300px;
      height: 400px;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .carrossel img {
      width: 100%;
      border-radius: 20px;
      position: absolute;
      opacity: 0;
      transform: scale(0.9);
      transition: all 0.5s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .carrossel img.ativo {
      opacity: 1;
      transform: scale(1);
    }

    /* BOTÕES */
    .botao {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 30px;
      background: rgba(0,0,0,0.4);
      color: white;
      border: none;
      cursor: pointer;
      padding: 10px;
      border-radius: 50%;
    }

    .esquerda { left: -50px; }
    .direita { right: -50px; }

    /* TEXTO */
    .texto {
      margin-top: 40px;
      width: 80%;
      max-width: 600px;
      text-align: center;
      color: white;
      font-size: 22px;
      background: rgba(0,0,0,0.4);
      padding: 20px;
      border-radius: 15px;
      display: none;
      transition: 0.5s;
    }
  </style>
</head>

<body>

  <!-- TELA INICIAL -->
  <div class="start" onclick="iniciar()">
    Clique para começar ❤️
  </div>

  <!-- MÚSICA (YOUTUBE INVISÍVEL) -->
  <iframe id="player"
    width="0"
    height="0"
    src="https://www.youtube.com/embed/6xKWiCMKKJg?autoplay=0&loop=1&playlist=6xKWiCMKKJg"
    frameborder="0"
    allow="autoplay">
  </iframe>

  <!-- CARROSSEL -->
  <div class="carrossel" id="carrossel">
    <button class="botao esquerda" onclick="anterior()">❮</button>

    <img src="foto1.jpg" class="ativo">
    <img src="foto2.jpg">
    <img src="foto3.jpg">

    <button class="botao direita" onclick="proxima()">❯</button>
  </div>

  <!-- TEXTO -->
  <div class="texto" id="texto">
    Eu te amo em níveis absurdos ❤️
  </div>

  <script>
    let index = 0;

    const fotos = document.querySelectorAll(".carrossel img");
    const texto = document.getElementById("texto");

    const mensagens = [
      "Eu te amo em níveis absurdos ❤️",
      "Eu viveria e morreria por você ❤️",
      "Sua presença me dá propósito para continuar ❤️"
    ];

    function iniciar() {
      document.querySelector(".start").style.display = "none";
      document.getElementById("carrossel").style.display = "flex";
      texto.style.display = "block";

      let iframe = document.getElementById("player");
      iframe.src = iframe.src.replace("autoplay=0", "autoplay=1");
    }

    function mostrarFoto(i) {
      fotos.forEach(f => f.classList.remove("ativo"));
      fotos[i].classList.add("ativo");

      texto.style.opacity = 0;

      setTimeout(() => {
        texto.innerText = mensagens[i];
        texto.style.opacity = 1;
      }, 200);
    }

    function proxima() {
      index = (index + 1) % fotos.length;
      mostrarFoto(index);
    }

    function anterior() {
      index = (index - 1 + fotos.length) % fotos.length;
      mostrarFoto(index);
    }
  </script>

</body>
</html>
